  <polyline points="100,0 97,0 97,3" fill="none" stroke="#282435" stroke-width="0.5"/>
  <polyline points="0,100 3,100 3,97" fill="none" stroke="#282435" stroke-width="0.5"/>
  <polyline points="100,100 97,100 97,97" fill="none" stroke="#282435" stroke-width="0.5"/>
