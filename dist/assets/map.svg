  <circle cx="50" cy="30" r="0.5" fill="#191624"/>
  <circle cx="50" cy="65" r="0.5" fill="#191624"/>
  <circle cx="30" cy="50" r="0.5" fill="#191624"/>
  <circle cx="70" cy="50" r="0.5" fill="#191624"/>
  <circle cx="30" cy="30" r="0.4" fill="#161320"/>
  <circle cx="70" cy="30" r="0.4" fill="#161320"/>
  <circle cx="30" cy="65" r="0.4" fill="#161320"/>
  <circle cx="70" cy="65" r="0.4" fill="#161320"/>

