  <rect x="73" y="58" width="8" height="6" rx="1" fill="#110f18" stroke="#191624" stroke-width="0.3"/>
  <rect x="82" y="62" width="10" height="7" rx="1" fill="#110f18" stroke="#191624" stroke-width="0.3"/>
  <rect x="60" y="72" width="7" height="5" rx="0.5" fill="#110f18" stroke="#191624" stroke-width="0.3"/>
  <rect x="70" y="70" width="8" height="6" rx="0.5" fill="#110f18" stroke="#191624" stroke-width="0.3"/>
  <rect x="82" y="74" width="6" height="5" rx="0.5" fill="#110f18" stroke="#191624" stroke-width="0.3"/>
  <rect x="55" y="82" width="9" height="6" rx="0.5" fill="#110f18" stroke="#191624" stroke-width="0.3"/>
  <rect x="68" y="80" width="7" height="5" rx="0.5" fill="#110f18" stroke="#191624" stroke-width="0.3"/>
  <rect x="78" y="84" width="10" height="6" rx="0.5" fill="#110f18" stroke="#191624" stroke-width="0.3"/>
  <rect x="90" y="70" width="6" height="8" rx="0.5" fill="#110f18" stroke="#191624" stroke-width="0.3"/>
