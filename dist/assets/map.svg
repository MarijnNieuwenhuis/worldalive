  <rect x="42" y="8" width="6" height="5" rx="0.5" fill="#110f18" stroke="#191624" stroke-width="0.3"/>
  <rect x="55" y="7" width="7" height="5" rx="0.5" fill="#110f18" stroke="#191624" stroke-width="0.3"/>
  <!-- Right edge filler -->
  <rect x="85" y="35" width="8" height="6" rx="0.5" fill="#110f18" stroke="#191624" stroke-width="0.3"/>
  <rect x="88" y="45" width="7" height="5" rx="0.5" fill="#110f18" stroke="#191624" stroke-width="0.3"/>
  <rect x="85" y="22" width="6" height="5" rx="0.5" fill="#110f18" stroke="#191624" stroke-width="0.3"/>

