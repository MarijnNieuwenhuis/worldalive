  <polyline points="40,58 43,58" fill="none" stroke="#2d2840" stroke-width="0.7"/>
  <polyline points="40,58 40,55" fill="none" stroke="#2d2840" stroke-width="0.7"/>
  <polyline points="60,58 57,58" fill="none" stroke="#2d2840" stroke-width="0.7"/>
  <polyline points="60,58 60,55" fill="none" stroke="#2d2840" stroke-width="0.7"/>
