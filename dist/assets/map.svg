  <line x1="0" y1="40" x2="100" y2="40" stroke="#161320" stroke-width="0.3"/>
  <line x1="0" y1="60" x2="100" y2="60" stroke="#161320" stroke-width="0.3"/>
  <line x1="0" y1="80" x2="100" y2="80" stroke="#161320" stroke-width="0.3"/>
  <line x1="0" y1="90" x2="100" y2="90" stroke="#161320" stroke-width="0.3"/>
  <line x1="10" y1="0" x2="10" y2="100" stroke="#161320" stroke-width="0.3"/>
