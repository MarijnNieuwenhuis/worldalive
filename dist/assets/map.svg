<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="5" height="5" patternUnits="userSpaceOnUse">
      <path d="M 5 0 L 0 0 0 5" fill="none" stroke="#1e1c30" stroke-width="0.15"/>
    </pattern>
    <!-- Glow filter for key locations -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="#0f0e1a"/>
  <rect width="100" height="100" fill="url(#grid)"/>

  <!-- ═══ TERRAIN ZONES ═══ -->
  <!-- Rimrocks (south edge - elevated terrain) -->
  <path d="M 0,88 Q 20,84 40,86 Q 60,84 80,87 Q 90,85 100,88 L 100,100 L 0,100 Z" fill="#121020" stroke="#1a1830" stroke-width="0.3"/>
  <text x="50" y="95" text-anchor="middle" fill="#1e1c30" font-size="1.6" font-family="sans-serif" letter-spacing="0.4">RIMROCKS</text>

  <!-- Yellowstone River (north edge) -->
  <path d="M 0,5 Q 15,8 30,6 Q 50,4 70,7 Q 85,5 100,8" fill="none" stroke="#1a2535" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 0,5 Q 15,8 30,6 Q 50,4 70,7 Q 85,5 100,8" fill="none" stroke="#15202e" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <text x="85" y="4" text-anchor="middle" fill="#1e2a3a" font-size="1.2" font-family="sans-serif" font-style="italic">Yellowstone River</text>

  <!-- ═══ MAJOR ROADS ═══ -->
  <!-- I-90 (main east-west interstate) -->
  <line x1="0" y1="50" x2="100" y2="50" stroke="#252340" stroke-width="1.8"/>
  <line x1="0" y1="50" x2="100" y2="50" stroke="#2d2a48" stroke-width="0.4" stroke-dasharray="2,2"/>
  <text x="95" y="49" text-anchor="end" fill="#35305a" font-size="1.3" font-family="sans-serif" font-weight="bold">I-90</text>

  <!-- 27th Street (main north-south) -->
  <line x1="50" y1="8" x2="50" y2="88" stroke="#252340" stroke-width="1.4"/>
  <text x="51.5" y="14" fill="#35305a" font-size="1.1" font-family="sans-serif" transform="rotate(90,51.5,14)">27th St</text>

  <!-- 1st Ave N -->
  <line x1="25" y1="30" x2="75" y2="30" stroke="#1e1c35" stroke-width="0.8"/>
  <text x="77" y="30.5" fill="#2a2845" font-size="0.9" font-family="sans-serif">1st Ave N</text>

  <!-- Grand Ave -->
  <line x1="20" y1="65" x2="90" y2="65" stroke="#1e1c35" stroke-width="0.6"/>
  <text x="92" y="65.5" fill="#2a2845" font-size="0.9" font-family="sans-serif">Grand Ave</text>

  <!-- Secondary streets -->
  <line x1="30" y1="10" x2="30" y2="85" stroke="#191730" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="70" y1="10" x2="70" y2="85" stroke="#191730" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="15" y1="42" x2="85" y2="42" stroke="#191730" stroke-width="0.4" stroke-dasharray="2,3"/>
  <line x1="15" y1="75" x2="85" y2="75" stroke="#181628" stroke-width="0.3" stroke-dasharray="2,4"/>

  <!-- ═══ NEIGHBORHOOD LABELS ═══ -->
  <text x="68" y="18" text-anchor="middle" fill="#2a2845" font-size="1.8" font-family="sans-serif" font-weight="bold" letter-spacing="0.3">THE HEIGHTS</text>
  <text x="45" y="55" text-anchor="middle" fill="#2a2845" font-size="1.6" font-family="sans-serif" letter-spacing="0.2">DOWNTOWN</text>
  <text x="30" y="72" text-anchor="middle" fill="#252340" font-size="1.4" font-family="sans-serif" letter-spacing="0.2">WEST END</text>
  <text x="72" y="72" text-anchor="middle" fill="#252340" font-size="1.4" font-family="sans-serif" letter-spacing="0.2">MIDTOWN</text>

  <!-- ═══ CITY BLOCKS (ambient fill) ═══ -->
  <!-- Downtown core -->
  <rect x="38" y="43" width="6" height="5" rx="0.8" fill="#141225" stroke="#1e1c35" stroke-width="0.25"/>
  <rect x="46" y="43" width="5" height="5" rx="0.8" fill="#141225" stroke="#1e1c35" stroke-width="0.25"/>
  <rect x="38" y="56" width="7" height="4" rx="0.8" fill="#141225" stroke="#1e1c35" stroke-width="0.25"/>
  <rect x="47" y="56" width="5" height="4" rx="0.8" fill="#141225" stroke="#1e1c35" stroke-width="0.25"/>
  <rect x="54" y="44" width="4" height="4" rx="0.6" fill="#131122" stroke="#1c1a30" stroke-width="0.2"/>
  <rect x="33" y="44" width="4" height="4" rx="0.6" fill="#131122" stroke="#1c1a30" stroke-width="0.2"/>

  <!-- Heights blocks -->
  <rect x="62" y="20" width="5" height="4" rx="0.6" fill="#131122" stroke="#1c1a30" stroke-width="0.2"/>
  <rect x="75" y="22" width="6" height="4" rx="0.6" fill="#131122" stroke="#1c1a30" stroke-width="0.2"/>
  <rect x="62" y="12" width="4" height="3" rx="0.5" fill="#121020" stroke="#1a1830" stroke-width="0.2"/>
  <rect x="78" y="14" width="5" height="4" rx="0.5" fill="#121020" stroke="#1a1830" stroke-width="0.2"/>

  <!-- West End blocks -->
  <rect x="18" y="55" width="5" height="4" rx="0.6" fill="#121020" stroke="#1a1830" stroke-width="0.2"/>
  <rect x="25" y="56" width="4" height="3" rx="0.5" fill="#121020" stroke="#1a1830" stroke-width="0.2"/>
  <rect x="20" y="62" width="6" height="4" rx="0.6" fill="#121020" stroke="#1a1830" stroke-width="0.2"/>

  <!-- Midtown blocks -->
  <rect x="60" y="60" width="5" height="4" rx="0.6" fill="#121020" stroke="#1a1830" stroke-width="0.2"/>
  <rect x="68" y="58" width="4" height="3" rx="0.5" fill="#121020" stroke="#1a1830" stroke-width="0.2"/>
  <rect x="75" y="62" width="5" height="4" rx="0.6" fill="#121020" stroke="#1a1830" stroke-width="0.2"/>
  <rect x="82" y="60" width="6" height="5" rx="0.6" fill="#121020" stroke="#1a1830" stroke-width="0.2"/>

  <!-- Scattered residential -->
  <rect x="8" y="15" width="4" height="3" rx="0.4" fill="#110f1e" stroke="#181630" stroke-width="0.15"/>
  <rect x="15" y="18" width="3" height="3" rx="0.4" fill="#110f1e" stroke="#181630" stroke-width="0.15"/>
  <rect x="85" y="35" width="4" height="3" rx="0.4" fill="#110f1e" stroke="#181630" stroke-width="0.15"/>
  <rect x="10" y="35" width="5" height="3" rx="0.4" fill="#110f1e" stroke="#181630" stroke-width="0.15"/>

  <!-- ═══ KEY LOCATIONS ═══ -->

  <!-- Tuck's Books (bookstore where Jolene meets Amber) -->
  <g filter="url(#glow)">
    <rect x="35" y="25" width="12" height="7" rx="1.2" fill="#161430" stroke="#3a3560" stroke-width="0.5"/>
    <rect x="35.5" y="25.5" width="11" height="6" rx="0.8" fill="none" stroke="#2a2850" stroke-width="0.2"/>
    <text x="41" y="29.5" text-anchor="middle" fill="#5a5580" font-size="1.6" font-family="sans-serif" font-weight="bold">Tuck's Books</text>
  </g>

  <!-- The Rail Bar -->
  <g filter="url(#glow)">
    <rect x="42" y="44" width="10" height="6" rx="1.2" fill="#161430" stroke="#3a3560" stroke-width="0.5"/>
    <rect x="42.5" y="44.5" width="9" height="5" rx="0.8" fill="none" stroke="#2a2850" stroke-width="0.2"/>
    <text x="47" y="48" text-anchor="middle" fill="#5a5580" font-size="1.5" font-family="sans-serif" font-weight="bold">Rail Bar</text>
  </g>

  <!-- Home (residential cluster — where many characters live) -->
  <g filter="url(#glow)">
    <rect x="42" y="33" width="9" height="6" rx="1.2" fill="#161430" stroke="#3a3560" stroke-width="0.4"/>
    <text x="46.5" y="37" text-anchor="middle" fill="#5a5580" font-size="1.4" font-family="sans-serif">Home</text>
  </g>

  <!-- Downtown Apartment -->
  <g>
    <rect x="35" y="40" width="12" height="5" rx="1" fill="#141228" stroke="#302b50" stroke-width="0.4"/>
    <text x="41" y="43.5" text-anchor="middle" fill="#4a4570" font-size="1.2" font-family="sans-serif">Downtown Apt</text>
  </g>

  <!-- The Rail Bar label already covers downtown -->

  <!-- Cole's Ranch (outside town, southwest) -->
  <g filter="url(#glow)">
    <rect x="12" y="68" width="12" height="7" rx="1.2" fill="#141225" stroke="#302b50" stroke-width="0.4"/>
    <rect x="12.5" y="68.5" width="11" height="6" rx="0.8" fill="none" stroke="#252340" stroke-width="0.2"/>
    <!-- Fence lines -->
    <line x1="10" y1="68" x2="10" y2="76" stroke="#1e1c35" stroke-width="0.3" stroke-dasharray="1,1"/>
    <line x1="10" y1="76" x2="26" y2="76" stroke="#1e1c35" stroke-width="0.3" stroke-dasharray="1,1"/>
    <text x="18" y="72.5" text-anchor="middle" fill="#4a4570" font-size="1.4" font-family="sans-serif" font-weight="bold">Cole's Ranch</text>
  </g>

  <!-- CHS Refinery (industrial, far southwest) -->
  <g filter="url(#glow)">
    <rect x="6" y="76" width="13" height="7" rx="1" fill="#141220" stroke="#302838" stroke-width="0.4"/>
    <!-- Smokestacks -->
    <line x1="10" y1="73" x2="10" y2="76" stroke="#252340" stroke-width="0.6"/>
    <line x1="13" y1="74" x2="13" y2="76" stroke="#252340" stroke-width="0.6"/>
    <line x1="16" y1="73.5" x2="16" y2="76" stroke="#252340" stroke-width="0.6"/>
    <!-- Smoke wisps -->
    <path d="M10,73 Q11,71 10,70" fill="none" stroke="#1e1c30" stroke-width="0.3"/>
    <path d="M13,74 Q14,72 13,71" fill="none" stroke="#1e1c30" stroke-width="0.2"/>
    <text x="12.5" y="80.5" text-anchor="middle" fill="#4a4570" font-size="1.3" font-family="sans-serif" font-weight="bold">CHS Refinery</text>
  </g>

  <!-- The Heights Apartment -->
  <g>
    <rect x="62" y="15" width="14" height="6" rx="1" fill="#141228" stroke="#302b50" stroke-width="0.4"/>
    <text x="69" y="19" text-anchor="middle" fill="#4a4570" font-size="1.2" font-family="sans-serif">Heights Apt</text>
  </g>

  <!-- Heights Auto & Repair -->
  <g>
    <rect x="68" y="23" width="12" height="5" rx="1" fill="#141228" stroke="#302b50" stroke-width="0.4"/>
    <text x="74" y="26.5" text-anchor="middle" fill="#4a4570" font-size="1.1" font-family="sans-serif">Heights Auto</text>
  </g>

  <!-- Senior High -->
  <g>
    <rect x="54" y="32" width="11" height="6" rx="1" fill="#141228" stroke="#302b50" stroke-width="0.4"/>
    <text x="59.5" y="36" text-anchor="middle" fill="#4a4570" font-size="1.2" font-family="sans-serif">Senior High</text>
  </g>

  <!-- ═══ MISC LANDMARKS ═══ -->

  <!-- Parks (green-ish tint) -->
  <ellipse cx="78" cy="45" rx="4" ry="3" fill="#101520" stroke="#182530" stroke-width="0.3"/>
  <text x="78" y="45.5" text-anchor="middle" fill="#1e3030" font-size="0.9" font-family="sans-serif" font-style="italic">Pioneer Park</text>

  <ellipse cx="22" cy="28" rx="3" ry="2.5" fill="#101520" stroke="#182530" stroke-width="0.3"/>
  <text x="22" y="29" text-anchor="middle" fill="#1e3030" font-size="0.8" font-family="sans-serif" font-style="italic">Rose Park</text>

  <!-- Airport indicator (east) -->
  <text x="92" y="30" fill="#1e1c30" font-size="1" font-family="sans-serif" letter-spacing="0.2">✈ BIL</text>

  <!-- Compass rose (bottom-right) -->
  <g transform="translate(92,92)">
    <line x1="0" y1="-2.5" x2="0" y2="2.5" stroke="#252340" stroke-width="0.3"/>
    <line x1="-2.5" y1="0" x2="2.5" y2="0" stroke="#252340" stroke-width="0.3"/>
    <text x="0" y="-3" text-anchor="middle" fill="#35305a" font-size="1" font-family="sans-serif" font-weight="bold">N</text>
  </g>

  <!-- Scale bar (bottom-left) -->
  <line x1="5" y1="93" x2="15" y2="93" stroke="#252340" stroke-width="0.3"/>
  <line x1="5" y1="92" x2="5" y2="94" stroke="#252340" stroke-width="0.3"/>
  <line x1="15" y1="92" x2="15" y2="94" stroke="#252340" stroke-width="0.3"/>
  <text x="10" y="92" text-anchor="middle" fill="#252340" font-size="0.8" font-family="sans-serif">~1 mi</text>
</svg>
